<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompliOS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #22333b;
      --brown: #5e503f;
      --sand: #c6ac8f;
      --paper: #eae0d5;
      --paper-2: #f3ece4;
      --ink: #0a0908;
      --white: #fff;
      --line: #d8cab9;
      --accent: #c6ac8f;
      --radius-xl: 22px;
      --radius-md: 12px;
      --shadow: 0 20px 40px rgba(34, 51, 59, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.35), transparent 34%),
        radial-gradient(circle at 82% 8%, rgba(255, 255, 255, 0.24), transparent 28%),
        #d6e0f1;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .leaf-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background-image:
        radial-gradient(circle at 80% 16%, transparent 0 52px, #8fa5c8 53px 55px, transparent 56px),
        radial-gradient(circle at 90% 26%, transparent 0 34px, #8fa5c8 35px 36px, transparent 37px),
        linear-gradient(145deg, transparent 45%, #8fa5c8 45% 46%, transparent 47%);
    }

    .login-shell {
      width: min(1420px, 100%);
      min-height: min(86vh, 860px);
      background: var(--paper-2);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .illustration-pane {
      padding: 84px 52px 42px;
      display: grid;
      place-items: center;
      border-right: 1px solid var(--line);
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0));
    }

    .art {
      width: min(620px, 95%);
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      background: #f5efea;
      display: grid;
      place-items: center;
      border: 1px solid rgba(94, 80, 63, 0.18);
    }

    .art svg { width: 88%; height: 88%; }

    .form-pane {
      padding: 84px 72px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 3vw, 3rem);
      color: #114642;
      line-height: 1;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--brown);
      font-size: 1.15rem;
      max-width: 470px;
      margin-bottom: 18px;
    }

    .field {
      width: 100%;
      border: 1px solid #bca98f;
      background: #f8f3ee;
      border-radius: 10px;
      height: 54px;
      padding: 0 16px;
      font-size: 1rem;
      color: var(--navy);
      outline: none;
    }

    .field:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(34, 51, 59, 0.12);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap .field {
      padding-right: 52px;
    }

    .password-visibility-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
    }

    .password-visibility-toggle:focus-visible {
      outline: 2px solid var(--navy);
      outline-offset: 2px;
    }

    .password-visibility-icon {
      position: absolute;
      width: 24px;
      height: 24px;
      color: var(--ink);
      transition: opacity 0.16s ease, visibility 0.16s ease;
    }

    .password-visibility-icon.icon-hide {
      opacity: 0;
      visibility: hidden;
    }

    .password-wrap.show-password .password-visibility-icon.icon-show {
      opacity: 0;
      visibility: hidden;
    }

    .password-wrap.show-password .password-visibility-icon.icon-hide {
      opacity: 1;
      visibility: visible;
    }

    .inline-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.98rem;
      color: var(--brown);
      margin-top: -6px;
      margin-bottom: 4px;
    }

    .inline-row a {
      color: var(--navy);
      text-decoration: none;
      font-weight: 600;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      line-height: 1;
    }

    .check input {
      accent-color: var(--brown);
      width: 15px;
      height: 15px;
      margin: 0;
      transform: translateY(-1px);
    }

    .inline-row a {
      display: inline-flex;
      align-items: center;
      line-height: 1;
      transform: translateY(-1px);
    }

    .btn {
      width: 100%;
      height: 54px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(90deg, #245650, #2f6f68);
      color: var(--paper-2);
      font-size: 1.04rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 20px rgba(36, 86, 80, 0.2);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(36, 86, 80, 0.24);
      filter: saturate(1.05);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 14px rgba(36, 86, 80, 0.2);
    }

    .signup {
      text-align: center;
      color: #7e6d57;
      margin-top: 14px;
      font-size: 1.02rem;
    }

    .signup a {
      color: #114642;
      font-weight: 700;
      text-decoration: none;
    }

    .message {
      min-height: 22px;
      font-size: 0.96rem;
      font-weight: 600;
      margin-top: 6px;
    }

    .message.error { color: #a13333; }
    .message.success { color: #1d6a4f; }

    @media (max-width: 1060px) {
      .login-shell { grid-template-columns: 1fr; }
      .illustration-pane { display: none; }
      .form-pane { padding: 84px 26px 40px; }
    }
  </style>
</head>
<body>
  <div class="leaf-pattern"></div>

  <main class="login-shell" role="main">
    <section class="illustration-pane" aria-hidden="true">
      <div class="art">
        <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <style>
              .s{stroke:#3a3564;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}
            </style>
          </defs>
          <circle cx="255" cy="135" r="52" fill="#3fb274" class="s"/>
          <circle cx="165" cy="238" r="45" fill="#f5be2d" class="s"/>
          <circle cx="334" cy="306" r="39" fill="#98b04d" class="s"/>
          <circle cx="238" cy="422" r="46" fill="#ef5a63" class="s"/>
          <path d="M210 188c60 34 84 64 80 127" class="s"/>
          <path d="M262 177c-52 64-90 92-81 169" class="s"/>
          <path d="M196 271c55-6 89 5 137 24" class="s"/>
          <path d="M182 478h210" class="s"/>
          <circle cx="246" cy="139" r="6" fill="#1f244f"/>
          <circle cx="273" cy="155" r="6" fill="#1f244f"/>
          <path d="M240 171c10 14 34 14 44 0" class="s"/>
          <circle cx="153" cy="238" r="6" fill="#1f244f"/>
          <circle cx="184" cy="246" r="6" fill="#1f244f"/>
          <path d="M150 258c12 12 30 12 41 0" class="s"/>
          <circle cx="325" cy="302" r="5" fill="#1f244f"/>
          <circle cx="348" cy="307" r="5" fill="#1f244f"/>
          <path d="M324 322c10 10 26 10 36 0" class="s"/>
          <circle cx="224" cy="412" r="6" fill="#1f244f"/>
          <circle cx="253" cy="412" r="6" fill="#1f244f"/>
          <path d="M224 438c12-8 24-8 36 0" class="s"/>
          <path d="M90 160l20 20m0-20-20 20" class="s"/>
          <path d="M394 199h45" class="s"/>
          <path d="M418 178c10 0 18 7 19 18" class="s"/>
          <path d="M392 178c-10 0-18 7-19 18" class="s"/>
          <path d="M105 340h74" class="s"/>
          <path d="M96 340c0-13 10-23 23-23" class="s"/>
          <path d="M180 340c0-13-10-23-23-23" class="s"/>
        </svg>
      </div>
    </section>

    <section class="form-pane">
      <header>
        <h1>Welcome Back!</h1>
        <p class="subtitle">Log in to continue your compliance journey across safety, quality, and production operations.</p>
      </header>

      <form id="login-form">
        <input id="username" class="field" type="text" placeholder="Username" autocomplete="username" />
        <div id="password-wrap" class="password-wrap">
          <input id="password" class="field" type="password" placeholder="Password" autocomplete="current-password" />
          <button id="toggle-password-visibility" class="password-visibility-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <svg class="password-visibility-icon icon-show" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 12C4.9 7.7 8.1 5.5 12 5.5C15.9 5.5 19.1 7.7 22 12C19.1 16.3 15.9 18.5 12 18.5C8.1 18.5 4.9 16.3 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <svg class="password-visibility-icon icon-hide" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10.6 5.7C11.1 5.57 11.56 5.5 12 5.5C15.9 5.5 19.1 7.7 22 12C21.2 13.2 20.35 14.2 19.46 15.05" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.3 6.3C4.79 7.45 3.4 9.02 2 12C4.9 16.3 8.1 18.5 12 18.5C13.26 18.5 14.44 18.27 15.53 17.83" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.88 9.88C9.4 10.36 9.1 11.03 9.1 11.77C9.1 13.22 10.28 14.4 11.73 14.4C12.47 14.4 13.14 14.1 13.62 13.62" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="inline-row">
          <label class="check"><input id="remember-me" type="checkbox" /> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button class="btn" type="submit">Log in</button>
        <p id="login-message" class="message" aria-live="polite"></p>


        <p class="signup">Don't have an account? <a href="#">Register</a></p>
      </form>
    </section>
  </main>
  <script>
    const loginForm = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const passwordWrap = document.getElementById('password-wrap');
    const togglePasswordButton = document.getElementById('toggle-password-visibility');
    const messageEl = document.getElementById('login-message');

    const syncPasswordVisibility = (shouldShowPassword) => {
      passwordInput.type = shouldShowPassword ? 'text' : 'password';
      passwordWrap.classList.toggle('show-password', shouldShowPassword);
      togglePasswordButton.setAttribute('aria-pressed', String(shouldShowPassword));
      togglePasswordButton.setAttribute('aria-label', shouldShowPassword ? 'Hide password' : 'Show password');
    };

    togglePasswordButton.addEventListener('click', () => {
      const shouldShowPassword = passwordInput.type === 'password';
      syncPasswordVisibility(shouldShowPassword);
    });

    syncPasswordVisibility(false);

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (username === 'aman' && password === 'aman1234') {
        messageEl.textContent = 'Login successful. Redirecting to dashboard...';
        messageEl.className = 'message success';
        setTimeout(() => {
          window.location.href = 'main.html';
        }, 500);
        return;
      }

      messageEl.textContent = 'Invalid username or password. Please try again.';
      messageEl.className = 'message error';
    });
  </script>
</body>
</html>
